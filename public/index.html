<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ProfDavi50+</title>
  <style>
    :root {
      --ink: #182622;
      --muted: #60736d;
      --page: #edf4f1;
      --panel: #fffdf8;
      --brand: #24594f;
      --brand-dark: #163f38;
      --accent: #c46a2d;
      --accent-dark: #9d4e1f;
      --line: #d8e3de;
      --assistant: #ffffff;
      --user: #d9f0e8;
      --shadow: 0 18px 45px rgba(24, 38, 34, .12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      background: var(--page);
      color: var(--ink);
      font-size: 17px;
    }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      background:
        linear-gradient(180deg, rgba(36, 89, 79, .10), rgba(237, 244, 241, 0) 260px),
        var(--page);
    }
    header {
      background: linear-gradient(135deg, var(--brand-dark), var(--brand));
      color: white;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid rgba(255, 255, 255, .18);
      box-shadow: 0 10px 30px rgba(22, 63, 56, .18);
    }
    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      background: linear-gradient(135deg, #ffe2a8, #f4b86a);
      color: #2d2417;
      display: grid;
      place-items: center;
      font-weight: 700;
      flex: 0 0 auto;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .45), 0 6px 16px rgba(0, 0, 0, .16);
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    .subtitle {
      opacity: .9;
      font-size: 15px;
      margin-top: 3px;
    }
    main {
      overflow-y: auto;
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 26px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .message {
      max-width: min(760px, 90%);
      padding: 15px 17px;
      border-radius: 8px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-wrap: break-word;
      box-shadow: 0 2px 10px rgba(24, 38, 34, .08);
    }
    .assistant {
      align-self: flex-start;
      background: var(--assistant);
      border: 1px solid var(--line);
    }
    .user {
      align-self: flex-end;
      background: var(--user);
      border: 1px solid #b9ddd1;
    }
    form {
      width: min(980px, calc(100% - 28px));
      margin: 0 auto 12px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      padding: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    textarea {
      width: 100%;
      min-height: 58px;
      max-height: 150px;
      resize: vertical;
      font: inherit;
      border: 1px solid #b7c8c1;
      border-radius: 8px;
      padding: 14px 15px;
      outline-color: var(--accent);
      background: #ffffff;
      color: var(--ink);
    }
    textarea::placeholder { color: #758780; }
    button {
      min-width: 118px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      padding: 0 18px;
      box-shadow: 0 8px 18px rgba(196, 106, 45, .24);
    }
    button:hover { background: var(--accent-dark); }
    button:disabled {
      background: #89948f;
      box-shadow: none;
      cursor: wait;
    }
    .voice-button {
      min-width: 112px;
      background: var(--brand);
      box-shadow: 0 8px 18px rgba(36, 89, 79, .20);
    }
    .voice-button:hover { background: var(--brand-dark); }
    .voice-button.listening {
      background: #b83232;
      box-shadow: 0 0 0 4px rgba(184, 50, 50, .14), 0 8px 18px rgba(184, 50, 50, .20);
    }
    .voice-status {
      width: min(980px, 100%);
      margin: -4px auto 8px;
      padding: 0 20px;
      min-height: 20px;
      color: var(--muted);
      font-size: 14px;
    }
    .hint {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 0 20px 16px;
      color: var(--muted);
      font-size: 14px;
    }
    @media (max-width: 640px) {
      body { font-size: 16px; }
      header { padding: 14px 16px; }
      .avatar { width: 46px; height: 46px; }
      h1 { font-size: 21px; }
      .subtitle { font-size: 13px; }
      main { padding: 16px 12px; }
      form {
        grid-template-columns: 1fr;
        width: calc(100% - 20px);
        margin-bottom: 10px;
      }
      button { min-height: 50px; }
      .message { max-width: 96%; }
      .hint { display: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="avatar">PD</div>
      <div>
        <h1>ProfDavi50+</h1>
        <div class="subtitle">Conversa simples, clara e segura</div>
      </div>
    </header>
    <main id="messages">
      <div class="message assistant">Ola, eu sou o ProfDavi50+. Pode perguntar como se fosse uma conversa normal.</div>
    </main>
    <form id="chatForm">
      <textarea id="text" placeholder="Digite sua pergunta para o ProfDavi50+"></textarea>
      <button id="voiceButton" class="voice-button" type="button">Falar</button>
      <button id="sendButton" type="submit">Enviar</button>
    </form>
    <div id="voiceStatus" class="voice-status" aria-live="polite"></div>
    <div class="hint">Pressione Enter para enviar. Use Shift + Enter para pular linha. Use Falar para ditar sua pergunta.</div>
  </div>
  <script>
    const form = document.getElementById("chatForm");
    const input = document.getElementById("text");
    const messages = document.getElementById("messages");
    const button = document.getElementById("sendButton");
    const voiceButton = document.getElementById("voiceButton");
    const voiceStatus = document.getElementById("voiceStatus");
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    let listening = false;
    let voiceSendTimer;
    const voicePauseBeforeSendMs = 2800;

    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.lang = "pt-BR";
      recognition.continuous = true;
      recognition.interimResults = true;

      recognition.addEventListener("start", () => {
        listening = true;
        voiceButton.classList.add("listening");
        voiceButton.textContent = "Ouvindo";
        voiceStatus.textContent = "Estou ouvindo. Fale sua pergunta em voz alta.";
      });

      recognition.addEventListener("result", (event) => {
        let transcript = "";
        for (let index = 0; index < event.results.length; index++) {
          transcript += event.results[index][0].transcript;
        }
        input.value = transcript.trim();
        if (input.value.trim()) scheduleVoiceSend();
      });

      recognition.addEventListener("error", (event) => {
        voiceStatus.textContent = voiceErrorMessage(event.error);
      });

      recognition.addEventListener("end", () => {
        listening = false;
        voiceButton.classList.remove("listening");
        voiceButton.textContent = "Falar";
        clearTimeout(voiceSendTimer);
        if (!input.value.trim() && !voiceStatus.textContent) {
          voiceStatus.textContent = "Nao ouvi nenhuma fala. Tente novamente.";
        }
      });
    } else {
      voiceButton.disabled = true;
      voiceButton.textContent = "Sem voz";
      voiceStatus.textContent = "Seu navegador nao suporta comando por voz. Use Chrome ou Edge.";
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      await send();
    });

    input.addEventListener("keydown", async (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        await send();
      }
    });

    voiceButton.addEventListener("click", () => {
      if (!recognition) return;
      if (listening) {
        clearTimeout(voiceSendTimer);
        recognition.stop();
        if (input.value.trim()) send();
        return;
      }
      voiceStatus.textContent = "";
      input.value = "";
      recognition.start();
    });

    function scheduleVoiceSend() {
      clearTimeout(voiceSendTimer);
      voiceStatus.textContent = "Estou anotando. Vou enviar quando voce fizer uma pausa.";
      voiceSendTimer = setTimeout(() => {
        if (!input.value.trim() || button.disabled) return;
        voiceStatus.textContent = "Pausa percebida. Enviando sua pergunta...";
        recognition.stop();
        send();
      }, voicePauseBeforeSendMs);
    }

    async function send() {
      const text = input.value.trim();
      if (!text || button.disabled) return;
      addMessage(text, "user");
      input.value = "";
      button.disabled = true;
      voiceButton.disabled = true;
      button.textContent = "...";
      const waiting = addMessage("Pensando...", "assistant");
      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ text })
        });
        const data = await res.json();
        waiting.textContent = data.text || data.error || "Sem resposta.";
      } catch (error) {
        waiting.textContent = "Nao consegui responder agora. Verifique o deploy no Vercel.";
      } finally {
        button.disabled = false;
        button.textContent = "Enviar";
        if (recognition) voiceButton.disabled = false;
        input.focus();
        scrollToBottom();
      }
    }

    function voiceErrorMessage(code) {
      if (code === "not-allowed") return "Permita o uso do microfone no navegador para usar comando por voz.";
      if (code === "no-speech") return "Nao ouvi sua fala. Clique em Falar e tente novamente.";
      if (code === "audio-capture") return "Nao encontrei microfone ativo neste computador.";
      return "Nao consegui usar o microfone agora. Tente novamente.";
    }

    function addMessage(text, role) {
      const element = document.createElement("div");
      element.className = "message " + role;
      element.textContent = text;
      messages.appendChild(element);
      scrollToBottom();
      return element;
    }

    function scrollToBottom() {
      messages.scrollTop = messages.scrollHeight;
    }
  </script>
</body>
</html>
